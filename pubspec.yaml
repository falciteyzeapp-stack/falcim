name: falci_teyze
description: Falcı Teyze - Kahve Falı ve Tarot Yorumu
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_app_check: ^0.3.1+4
  cloud_functions: ^5.1.3
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

  # Social Auth
  google_sign_in: ^6.2.2
  flutter_facebook_auth: ^7.1.1
  sign_in_with_apple: ^6.1.3

  # State Management
  provider: ^6.1.2

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  camera: ^0.11.0

  # Payment
  in_app_purchase: ^3.2.0
  in_app_purchase_android: ^0.4.0

  # UI/Animation
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

  # Utils
  share_plus: ^10.1.2
  intl: ^0.19.0
  shared_preferences: ^2.3.4
  http: ^1.2.2
  uuid: ^4.5.1
  url_launcher: ^6.3.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: GreatVibes
      fonts:
        - asset: assets/fonts/GreatVibes-Regular.ttf
    - family: Cinzel
      fonts:
        - asset: assets/fonts/Cinzel-Regular.ttf
        - asset: assets/fonts/Cinzel-Bold.ttf
          weight: 700
